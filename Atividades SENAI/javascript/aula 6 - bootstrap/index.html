<!DOCTYPE html> 
<html lang='pt-br'> 
<head> 
    <meta charset='UTF-8'> 
    <meta name='viewport' content='width=device-width, initial-scale=1.0'> 
    <title>Loja de Doces</title> 
    <!-- Bootstrap CSS via CDN --> 
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' 
          rel='stylesheet'> 
    <link rel='stylesheet' href='styles/index.css'> 
</head> 
<body> 
    <nav class="navbar navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="#">🍬 Doce Mundo</a>
        <div class="d-flex gap-2">
            <input id="busca" class="form-control" type="text" placeholder="Pesquisar...">

        <span class="text-white">🛒 Carrinho: <span id="qtdCarrinho">0</span></span>

            <h2 class="text-center mb-4">Nossos Doces</h2>
            <div id="produtos" class="row g-3" ></div>
        </div>
    </div>
 
    <!-- Bootstrap JS via CDN (necessário para componentes interativos) --> 
    <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js'></script> 
    <script src='scripts/script.js'></script>

</html>
