<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salário Família</title>
    <link rel="stylesheet" href="styles/index.css">
</head>
</body>
<form action="#">
    <h1>FORMULARIO ABSURDO</h1>
    <div class="formAssunto">
        <label for="nome">Nome : </label>
        <input id="nome" required type="text" placeholder="Exemplo : João">
    </div>
    <div class="Prevsituação">
        <label for="cor">Cor : </label>
        <input id="cor" required type="color">
    </div>
    <select name="filhos" id="filhos">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4 ou mais">4 ou mais</option>
    </select>
    <div class="formAssunto">
        <label for="salário">salário : </label>
        <input id="salario" required type="number" placeholder="Exemplo : João">
    </div>
    <div>
        <button type="submit">Calcular</button>
    </div>
</form>  
</body>
</html>
